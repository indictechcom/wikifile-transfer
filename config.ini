
[app]
production = [PRODUCTION_STATUS] # e.g. True or False

[redis_dev]
url = [REDIS_BROKER_URL] # e.g. redis://redis:6379/0

[redis_prod]
password = [REDIS_PASSWORD]
host     = [REDIS_HOST] # e.g tools-redis.svc.eqiad.wmflabs
port     = [REDIS_PORT] # e.g. 6379
db       = [REDIS_DB] # e.g. 0

[celery]
default_queue   = wikifile-transfer
result_expires  = 3600

[logging]
level    = INFO
dir      = logs